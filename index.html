<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>בדיקת Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h1>בדיקת Supabase</h1>

<button id="btn">בדוק חיבור</button>

<script>
document.getElementById("btn").addEventListener("click", function() {

  if (!window.supabase) {
    alert("Supabase לא נטען");
    return;
  }

  alert("Supabase נטען תקין");

});
</script>

</body>
</html>
