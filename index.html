<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Finance App</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background-color: #f2f2f2; }
    button { margin-top: 10px; padding: 6px 12px; }
  </style>
</head>
<body>

<h2>Transactions</h2>

<input type="file" id="fileInput" accept=".csv">
<button onclick="uploadCSV()">Upload CSV</button>

<div id="output">Loading...</div>

<script>
  const supabaseUrl = "https://tbciaxkeoztegfqiiozp.supabase.co";
  const supabaseKey = "sb_publishable_uVgowcNS5R846L874cXoZQ_6Hm-dFql";

  const client = window.supabase.createClient(supabaseUrl, supabaseKey);

  async function loadData() {
    const { data, error } = await client
      .from("transactions")
      .select("*")
      .order("date", { ascending: false });

    if (error) {
      document.getElementById("output").innerText = "Error: " + error.message;
      return;
    }

    if (!data || data.length === 0) {
      document.getElementById("output").innerText = "No transactions yet.";
      return;
    }

    let html = `
      <table>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Category</th>
          <th>Amount</th>
        </tr>
    `;

    data.forEach(row => {
      html += `
        <tr>
          <td>${row.date || ""}</td>
          <td>${row.description || ""}</td>
          <td>${row.category || ""}</td>
          <td>${row.amount || ""}</td>
        </tr>
      `;
    });

    html += "</table>";
    document.getElementById("output").innerHTML = html;
  }

  async function uploadCSV() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) {
      alert("Please select a CSV file.");
      return;
    }

    const text = await file.text();
    const rows = text.split("\n").slice(1);

    let transactions = [];

    rows.forEach(row => {
      const cols = row.split(",");
      if (cols.length >= 4) {
        transactions.push({
          date: cols[0].trim(),
          description: cols[1].trim(),
          category: cols[2].trim(),
          amount: parseFloat(cols[3])
        });
      }
    });

    if (transactions.length === 0) {
      alert("No valid rows found.");
      return;
    }

    const { error } = await client
      .from("transactions")
      .insert(transactions);

    if (error) {
      alert("Upload error: " + error.message);
    } else {
      alert("Upload successful!");
      loadData();
    }
  }

  loadData();
</script>

</body>
</html>
