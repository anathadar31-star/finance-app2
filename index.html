<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>בדיקת CSV</title>
</head>
<body>

<h2>בדיקת קריאת קובץ</h2>

<input type="file" id="fileInput">
<button onclick="readFile()">בדיקה</button>

<script>
function readFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("לא נבחר קובץ");
    return;
  }

  alert("שם הקובץ: " + file.name);

  file.text().then(text => {
    alert("תוכן הקובץ:\n\n" + text);
  });
}
</script>

</body>
</html>
