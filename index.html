<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>בדיקת קריאה 2</title>
</head>
<body>

<h2>בדיקה</h2>

<input type="file" id="fileInput">
<button onclick="readFile()">בדיקה</button>

<script>
function readFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("לא נבחר קובץ");
    return;
  }

  alert("גודל הקובץ: " + file.size + " bytes");

  const reader = new FileReader();

  reader.onload = function(e) {
    alert("תוכן:\n\n" + e.target.result);
  };

  reader.onerror = function() {
    alert("שגיאה בקריאה");
  };

  reader.readAsText(file);
}
</script>

</body>
</html>
