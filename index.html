<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מנהל כספים אישי</title>
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
direction:rtl;
text-align:right;
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

h1{text-align:center;}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-top:20px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#111827;
color:white;
font-weight:bold;
}

.transaction{
background:white;
padding:12px;
border-radius:10px;
margin-top:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.06);
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.label{
font-size:13px;
color:#666;
}

.value{
font-weight:bold;
}

.income{color:green;}
.expense{color:red;}

.total{
font-weight:bold;
font-size:20px;
margin-top:15px;
text-align:center;
}
</style>
</head>

<body>

<h1>מנהל כספים אישי</h1>

<div class="card">
<input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
<button onclick="loadFile()">טען קובץ</button>
<div id="status"></div>
<div class="total" id="total"></div>
</div>

<div id="transactions"></div>

<script>

function loadFile(){
const input=document.getElementById("fileInput");
if(!input.files.length){
document.getElementById("status").innerText="בחרי קובץ קודם";
return;
}

const reader=new FileReader();
reader.onload=function(e){
const data=new Uint8Array(e.target.result);
const workbook=XLSX.read(data,{type:"array"});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
const rows=XLSX.utils.sheet_to_json(sheet,{header:1});
display(rows);
};
reader.readAsArrayBuffer(input.files[0]);
}

function display(rows){

const container=document.getElementById("transactions");
container.innerHTML="";
let total=0;

function excelDate(serial){
const d=new Date(1899,11,30);
d.setDate(d.getDate()+serial);
return d.toLocaleDateString("he-IL");
}

let startIndex=0;
for(let i=0;i<rows.length;i++){
if(rows[i] && rows[i][4]!==undefined && rows[i][5]!==undefined){
if(rows[i][4]==="חובה" || rows[i][5]==="זכות"){
startIndex=i+1;
break;
}
}
}

for(let i=startIndex;i<rows.length;i++){

const r=rows[i];
if(!r) continue;

const debit=parseFloat(r[4]);
const credit=parseFloat(r[5]);

if(isNaN(debit) && isNaN(credit)) continue;

let date=r[0];
if(typeof date==="number") date=excelDate(date);

const type=r[1]||"";
const details=r[2]||"";

let amount=0;
if(!isNaN(credit) && credit>0) amount=Math.abs(credit);
else if(!isNaN(debit) && debit>0) amount=-Math.abs(debit);
else continue;

total+=amount;

let cls=amount>0?"income":"expense";

container.innerHTML+=`
<div class="transaction">
<div class="row"><span class="label">תאריך</span><span class="value">${date||""}</span></div>
<div class="row"><span class="label">סוג</span><span class="value">${type}</span></div>
<div class="row"><span class="label">פרטים</span><span>${details}</span></div>
<div class="row"><span class="label">סכום</span><span class="value ${cls}">${amount.toLocaleString("he-IL")}</span></div>
</div>`;
}

document.getElementById("total").innerText=
"מאזן כולל: ₪ "+total.toLocaleString("he-IL");

document.getElementById("status").innerText="הטעינה הסתיימה";
}

</script>

</body>
</html>
