<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Finance App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Transactions</h2>
<div id="output">Loading...</div>

<script>
  const supabaseUrl = "https://tbciaxkeoztegfqiiozp.supabase.co";
  const supabaseKey = "sb_publishable_uVgowcNS5R846L874cXoZQ_6Hm-dFql";

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  async function loadData() {
    const { data, error } = await supabase
      .from("transactions")
      .select("*");

    if (error) {
      document.getElementById("output").innerText = "Error: " + error.message;
      return;
    }

    if (!data || data.length === 0) {
      document.getElementById("output").innerText = "No transactions yet.";
      return;
    }

    let html = "<ul>";
    data.forEach(row => {
      html += `<li>${row.description} - ${row.amount}</li>`;
    });
    html += "</ul>";

    document.getElementById("output").innerHTML = html;
  }

  loadData();
</script>

</body>
</html>
