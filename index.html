<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Dashboard</title>
<style>
body{font-family:Arial,sans-serif;direction:rtl;background:#f4f7fb;margin:0;padding:20px;color:#243447;}
.header{max-width:1200px;margin:0 auto 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
h1{margin:0;font-size:28px;}
#status{margin:0;color:#5a6878;}
.layout{max-width:1200px;margin:0 auto;display:grid;gap:14px;grid-template-columns:repeat(12,minmax(0,1fr));}
.card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.kpi{grid-column:span 4;}
.kpi .label{font-size:14px;color:#6c7b8a;}
.kpi .value{font-size:24px;font-weight:700;margin-top:6px;}
.panel{grid-column:span 6;min-height:220px;}
.full{grid-column:span 12;}
.placeholder{height:170px;border:2px dashed #d6e0eb;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#7b8a99;}
table{width:100%;border-collapse:collapse;}
th,td{text-align:right;padding:9px;border-bottom:1px solid #eef2f6;white-space:nowrap;}
th{background:#f8fbff;font-weight:600;}
@media (max-width:900px){.kpi,.panel,.full{grid-column:span 12;}}
</style>
</head>
<body>
  <div class="header">
    <h1>דשבורד פיננסי</h1>
    <p id="status">טוען נתונים מהגיליון המאוחד...</p>
  </div>

  <section class="layout">
    <article class="card kpi">
      <div class="label">סה"כ תנועות</div>
      <div class="value" id="kpiCount">-</div>
    </article>
    <article class="card kpi">
      <div class="label">סה"כ הוצאות</div>
      <div class="value" id="kpiExpenses">-</div>
    </article>
    <article class="card kpi">
      <div class="label">סה"כ הכנסות</div>
      <div class="value" id="kpiIncome">-</div>
    </article>

    <article class="card panel">
      <h3>גרף קטגוריות (placeholder)</h3>
      <div class="placeholder" id="categoryChartPlaceholder">מוכן לחיבור Chart.js / ApexCharts</div>
    </article>

    <article class="card panel">
      <h3>גרף מגמת זמן (placeholder)</h3>
      <div class="placeholder" id="trendChartPlaceholder">מוכן לגרף הוצאות לפי חודשים</div>
    </article>

    <article class="card full">
      <h3>עסקאות אחרונות</h3>
      <table>
        <thead>
          <tr>
            <th>תאריך</th>
            <th>מקור</th>
            <th>תיאור</th>
            <th>קטגוריה</th>
            <th>סכום</th>
          </tr>
        </thead>
        <tbody id="recentTableBody"></tbody>
      </table>
    </article>
  </section>

<script type="module">
import { loadMasterTransactions, buildAnalytics } from './js/data.js';

function formatILS(value){
  return value.toLocaleString('he-IL', { style:'currency', currency:'ILS' });
}

function renderRecentRows(rows){
  const body = document.getElementById('recentTableBody');
  body.innerHTML = '';

  if(rows.length === 0){
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = 5;
    td.textContent = 'לא נמצאו עסקאות להצגה.';
    tr.appendChild(td);
    body.appendChild(tr);
    return;
  }

  rows.slice(0, 12).forEach(item => {
    const tr = document.createElement('tr');
    const values = [item.date, item.source, item.description, item.category, formatILS(item.amount)];
    values.forEach(v => {
      const td = document.createElement('td');
      td.textContent = v || '-';
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });
}

async function initDashboard(){
  const status = document.getElementById('status');
  try{
    const transactions = await loadMasterTransactions();
    const analytics = buildAnalytics(transactions);

    document.getElementById('kpiCount').textContent = transactions.length.toLocaleString('he-IL');
    document.getElementById('kpiExpenses').textContent = formatILS(analytics.expenses);
    document.getElementById('kpiIncome').textContent = formatILS(analytics.income);
    renderRecentRows(transactions);

    status.textContent = `נטענו ${transactions.length} תנועות מהגיליון המאוחד.`;
  }catch(error){
    status.textContent = 'שגיאה בטעינת נתוני הדשבורד. בדקי שהגיליון ציבורי ותקין.';
    renderRecentRows([]);
    console.error(error);
  }
}

window.addEventListener('DOMContentLoaded', initDashboard);
</script>
</body>
</html>
