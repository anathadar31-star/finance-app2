<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מנהל כספים אישי PRO</title>

<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
direction:rtl;
}

h1{text-align:center;}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-top:15px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#111827;
color:white;
font-weight:bold;
}

.summary{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
}

.summary-box{
flex:1;
min-width:100px;
background:#fff;
padding:12px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.06);
text-align:center;
}

.income{color:green;font-weight:bold;}
.expense{color:red;font-weight:bold;}
.net{font-weight:bold;}

.transaction{
background:white;
padding:12px;
border-radius:10px;
margin-top:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.06);
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

input, select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
margin-top:5px;
width:100%;
}
</style>
</head>

<body>

<h1>מנהל כספים אישי PRO</h1>

<div class="card">
<input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
<button onclick="loadFile()">טען קובץ</button>

<input type="text" id="searchInput" placeholder="חיפוש חופשי..." oninput="render()">
<select id="monthFilter" onchange="render()">
<option value="">כל החודשים</option>
</select>
</div>

<div class="summary">
<div class="summary-box">
הכנסות<br>
<span id="sumIncome" class="income">0</span>
</div>
<div class="summary-box">
הוצאות<br>
<span id="sumExpense" class="expense">0</span>
</div>
<div class="summary-box">
מאזן נטו<br>
<span id="sumNet" class="net">0</span>
</div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div id="transactions"></div>

<script>

let allData=[];
let chart;

function loadFile(){
const input=document.getElementById("fileInput");
if(!input.files.length) return;

const reader=new FileReader();
reader.onload=function(e){
const data=new Uint8Array(e.target.result);
const workbook=XLSX.read(data,{type:"array"});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
const rows=XLSX.utils.sheet_to_json(sheet,{header:1});
process(rows);
};
reader.readAsArrayBuffer(input.files[0]);
}

function process(rows){

allData=[];
let start=0;

for(let i=0;i<rows.length;i++){
if(rows[i] && rows[i][4]==="חובה") {start=i+1;break;}
}

function excelDate(serial){
const d=new Date(1899,11,30);
d.setDate(d.getDate()+serial);
return d;
}

for(let i=start;i<rows.length;i++){

const r=rows[i];
if(!r) continue;

const debit=parseFloat(r[4]);
const credit=parseFloat(r[5]);
if(isNaN(debit) && isNaN(credit)) continue;

let date=r[0];
if(typeof date==="number") date=excelDate(date);
else date=new Date(date);

let amount=0;
if(credit>0) amount=credit;
else if(debit>0) amount=-debit;
else continue;

allData.push({
date,
type:r[1]||"",
details:r[2]||"",
amount
});
}

populateMonths();
render();
}

function populateMonths(){
const select=document.getElementById("monthFilter");
const months=[...new Set(allData.map(d=>d.date.getMonth()+"-"+d.date.getFullYear()))];
months.forEach(m=>{
const [month,year]=m.split("-");
const option=document.createElement("option");
option.value=m;
option.text=Number(month)+1+"/"+year;
select.appendChild(option);
});
}

function render(){

const container=document.getElementById("transactions");
container.innerHTML="";

let search=document.getElementById("searchInput").value.toLowerCase();
let month=document.getElementById("monthFilter").value;

let filtered=allData.filter(d=>{
let matchSearch=d.details.toLowerCase().includes(search)||d.type.toLowerCase().includes(search);
let matchMonth=true;
if(month){
let key=d.date.getMonth()+"-"+d.date.getFullYear();
matchMonth=(key===month);
}
return matchSearch && matchMonth;
});

let sumIncome=0,sumExpense=0;

filtered.forEach(d=>{
if(d.amount>0) sumIncome+=d.amount;
if(d.amount<0) sumExpense+=d.amount;

container.innerHTML+=`
<div class="transaction">
<div class="row"><span>תאריך</span><span>${d.date.toLocaleDateString("he-IL")}</span></div>
<div class="row"><span>סוג</span><span>${d.type}</span></div>
<div class="row"><span>פרטים</span><span>${d.details}</span></div>
<div class="row"><span>סכום</span><span class="${d.amount>0?'income':'expense'}">${d.amount.toLocaleString("he-IL")}</span></div>
</div>`;
});

let net=sumIncome+sumExpense;

document.getElementById("sumIncome").innerText=sumIncome.toLocaleString("he-IL");
document.getElementById("sumExpense").innerText=sumExpense.toLocaleString("he-IL");
document.getElementById("sumNet").innerText=net.toLocaleString("he-IL");

renderChart();
}

function renderChart(){

let monthly={};

allData.forEach(d=>{
let key=(d.date.getMonth()+1)+"/"+d.date.getFullYear();
if(!monthly[key]) monthly[key]=0;
monthly[key]+=d.amount;
});

let labels=Object.keys(monthly);
let values=Object.values(monthly);

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:labels,
datasets:[{
label:'מאזן חודשי',
data:values
}]
}
});
}

</script>

</body>
</html>
