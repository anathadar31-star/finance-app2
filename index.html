<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Test Connection</h2>
<div id="result">Checking...</div>

<script>
const supabaseUrl = "https://tbciaxkeoztegfqiiozp.supabase.co";
const supabaseKey = "sb_publishable_uVgowcNS5R846L874cXoZQ_6Hm-dFql";

const client = supabase.createClient(supabaseUrl, supabaseKey);

async function test() {
  const { data, error } = await client
    .from("transactions")
    .select("id");

  if (error) {
    document.getElementById("result").innerText = "ERROR: " + error.message;
  } else {
    document.getElementById("result").innerText = "Connected. Rows: " + data.length;
  }
}

test();
</script>

</body>
</html>
