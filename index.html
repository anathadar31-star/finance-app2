<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מנהל כספים פשוט</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; background:#f4f6f8; margin:0; padding:20px;}
h1 {text-align:center;}
.card {background:white; padding:15px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.08); margin-top:20px;}
button {padding:10px 15px; border:none; border-radius:8px; cursor:pointer; background:#111827; color:white; font-weight:bold;}
table {width:100%; border-collapse:collapse; margin-top:15px;}
th, td {padding:8px; border-bottom:1px solid #ddd; text-align:right;}
th {background:#f1f1f1;}
.total {font-weight:bold; font-size:18px; margin-top:10px;}
</style>
</head>

<body>

<h1>מנהל כספים אישי</h1>

<div class="card">
<input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
<button onclick="loadFile()">טען קובץ</button>
<div id="status"></div>
<div class="total" id="total"></div>
<table>
<thead>
<tr>
<th>תאריך</th>
<th>תיאור</th>
<th>סכום</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>
function loadFile() {
const input = document.getElementById('fileInput');
if (!input.files.length) {
document.getElementById('status').innerText = "בחרי קובץ קודם";
return;
}

const file = input.files[0];
const reader = new FileReader();

reader.onload = function(e) {
const data = new Uint8Array(e.target.result);
const workbook = XLSX.read(data, {type: 'array'});
const sheet = workbook.Sheets[workbook.SheetNames[0]];
const rows = XLSX.utils.sheet_to_json(sheet, {header:1});

displayData(rows);
};

reader.readAsArrayBuffer(file);
}

function displayData(rows) {
const tbody = document.getElementById("tableBody");
tbody.innerHTML = "";
let total = 0;

for (let i = 1; i < rows.length; i++) {
const row = rows[i];
if (!row || row.length < 3) continue;

const date = row[0];
const desc = row[1];
const amount = parseFloat(row[2]);

if (!isNaN(amount)) total += amount;

tbody.innerHTML += `
<tr>
<td>${date || ""}</td>
<td>${desc || ""}</td>
<td>${!isNaN(amount) ? amount.toLocaleString("he-IL") : ""}</td>
</tr>
`;
}

document.getElementById("total").innerText = "סכום כולל: ₪ " + total.toLocaleString("he-IL");
document.getElementById("status").innerText = "הטעינה הסתיימה";
}
</script>

</body>
</html>
