<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מנהל כספים אישי</title>
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
direction:rtl;
text-align:right;
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}
h1{text-align:center;}
.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-top:20px;
}
button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#111827;
color:white;
font-weight:bold;
}
table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}
th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:right;
}
th{background:#f1f1f1;}
.income{color:green;font-weight:bold;}
.expense{color:red;font-weight:bold;}
.total{font-weight:bold;font-size:18px;margin-top:10px;}
</style>
</head>

<body>

<h1>מנהל כספים אישי</h1>

<div class="card">
<input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
<button onclick="loadFile()">טען קובץ</button>
<div id="status"></div>
<div class="total" id="total"></div>

<table>
<thead>
<tr>
<th>תאריך</th>
<th>סוג תנועה</th>
<th>פרטים</th>
<th>סכום</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>

function loadFile(){
const input=document.getElementById("fileInput");
if(!input.files.length){
document.getElementById("status").innerText="בחרי קובץ קודם";
return;
}

const reader=new FileReader();
reader.onload=function(e){
const data=new Uint8Array(e.target.result);
const workbook=XLSX.read(data,{type:"array"});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
const rows=XLSX.utils.sheet_to_json(sheet,{header:1});
display(rows);
};
reader.readAsArrayBuffer(input.files[0]);
}

function display(rows){

const tbody=document.getElementById("tableBody");
tbody.innerHTML="";
let total=0;

function excelDate(serial){
const d=new Date(1899,11,30);
d.setDate(d.getDate()+serial);
return d.toLocaleDateString("he-IL");
}

/* --- מציאת שורת הכותרת האמיתית --- */
let startIndex=0;
for(let i=0;i<rows.length;i++){
if(rows[i] && rows[i][0]==="תאריך"){
startIndex=i+1;
break;
}
}

/* --- קריאת תנועות רק מהשורה הנכונה --- */
for(let i=startIndex;i<rows.length;i++){

const r=rows[i];
if(!r) continue;

let date=r[0];
if(typeof date==="number") date=excelDate(date);

const type=r[1]||"";
const details=r[2]||"";
const debit=parseFloat(r[4])||0;
const credit=parseFloat(r[5])||0;

let amount=0;
if(credit>0) amount=Math.abs(credit);
else if(debit>0) amount=-Math.abs(debit);

if(amount===0) continue;

total+=amount;

let cls="";
if(amount>0) cls="income";
if(amount<0) cls="expense";

tbody.innerHTML+=`
<tr>
<td>${date||""}</td>
<td>${type}</td>
<td>${details}</td>
<td class="${cls}">
${amount.toLocaleString("he-IL")}
</td>
</tr>`;
}

document.getElementById("total").innerText=
"מאזן כולל: ₪ "+total.toLocaleString("he-IL");

document.getElementById("status").innerText="הטעינה הסתיימה";
}

</script>

</body>
</html>
