<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>טעינת CSV למסד</title>
<style>
body{
font-family:Arial;
direction:rtl;
padding:30px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
}

#result{
margin-top:20px;
font-weight:bold;
}
</style>
</head>
<body>

<h2>טעינת קובץ CSV למסד</h2>

<input type="file" id="fileInput" accept=".csv"><br>
<button onclick="uploadCSV()">טעינה למסד</button>

<div id="result"></div>

<script>

const SUPABASE_URL = "https://tbciaxkeoztegfqiiozp.supabase.co";
const SUPABASE_KEY = "sb_publishable_uVgowcNS5R846L874cXoZQ_6Hm-dFql";

async function uploadCSV(){

const file = document.getElementById("fileInput").files[0];

if(!file){
alert("לא נבחר קובץ");
return;
}

const text = await file.text();

const rows = text.split("\n");

let inserted = 0;
let duplicates = 0;

for(let line of rows){

if(!line.trim()) continue;

const parts = line.split(",");

if(parts.length < 4) continue;

const record = {
date: parts[0].trim(),
description: parts[1].trim(),
category: parts[2].trim(),
amount: Number(parts[3].trim())
};

const response = await fetch(
SUPABASE_URL + "/rest/v1/transactions",
{
method:"POST",
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY,
"Content-Type":"application/json",
"Prefer":"return=minimal"
},
body:JSON.stringify(record)
}
);

if(response.status === 409){
duplicates++;
}else if(response.ok){
inserted++;
}else{
const error = await response.text();
alert("שגיאה:\n" + error);
return;
}

}

document.getElementById("result").innerText =
"סיום טעינה\nנוספו: " + inserted + "\nכפילויות: " + duplicates;

}

</script>

</body>
</html>
