<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>בדיקת כתיבה למסד</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1"></script>

</head>
<body>

<h1>בדיקת כתיבה למסד</h1>
<button id="btn">הוסף רשומה לבדיקה</button>

<script>
const supabase = supabase.createClient(
  "https://tbciaxkeoztegfqiiozp.supabase.co",
  "sb_publishable_uVgowcNS5R846L874cXoZQ_6Hm-dFql"
);

document.getElementById("btn").addEventListener("click", async function() {

  const { error } = await supabase
    .from('transactions')
    .insert([
      {
        date: "2026-03-03",
        description: "בדיקה",
        category: "test",
        amount: 1
      }
    ]);

  if (error) {
    alert("שגיאה: " + error.message);
  } else {
    alert("נכתב למסד בהצלחה");
  }

});
</script>

</body>
</html>
