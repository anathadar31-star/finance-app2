<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>רשימת הוצאות</title>

<style>

body{
font-family:Arial;
direction:rtl;
padding:30px;
}

h1{
text-align:center;
}

button{
padding:10px 20px;
margin:20px 0;
font-size:16px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:right;
}

th{
background:#f2f2f2;
}

#total{
margin-top:25px;
font-size:22px;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<h1>רשימת הוצאות</h1>

<button onclick="loadData()">טען נתונים</button>

<table>

<thead>
<tr>
<th>תאריך</th>
<th>תיאור</th>
<th>קטגוריה</th>
<th>סכום</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<div id="total"></div>

<script>

const SUPABASE_URL="https://tbciaxkeoztegfqiiozp.supabase.co";
const SUPABASE_KEY="sb_publishable_uVgowcNS5R846L874cXoZQ_6Hm-dFql";

async function loadData(){

const response = await fetch(
SUPABASE_URL + "/rest/v1/transactions?select=*",
{
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer " + SUPABASE_KEY
}
});

const data = await response.json();

const tbody = document.getElementById("tbody");
tbody.innerHTML="";

let total = 0;

data.forEach(row=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${row.date}</td>
<td>${row.description}</td>
<td>${row.category}</td>
<td>${row.amount}</td>
`;

tbody.appendChild(tr);

total += Number(row.amount);

});

document.getElementById("total").innerText =
"סה״כ הוצאות: " + total + " ₪";

}

</script>

</body>
</html>
