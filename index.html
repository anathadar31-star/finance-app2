<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>טעינת CSV למסד</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>טעינת CSV למסד</h2>

<input type="file" id="fileInput">
<button onclick="upload()">טעינה למסד</button>

<script>
const supabaseUrl = "https://tbciaxkeoztegfqiiozp.supabase.co";
const supabaseKey = "sb_publishable_uVgowcNS5R846L874cXoZQ_6Hm-dFql";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function upload() {

  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("לא נבחר קובץ");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e) {

    const text = e.target.result;
    const lines = text.split("\n");

    if (lines.length < 2) {
      alert("אין נתונים");
      return;
    }

    let inserted = 0;
    let duplicates = 0;

    for (let i = 0; i < lines.length; i++) {

      if (!lines[i].trim()) continue;

      const parts = lines[i].split(",");

      if (parts.length < 4) continue;

      const row = {
        date: parts[0].trim(),
        description: parts[1].trim(),
        category: parts[2].trim(),
        amount: Number(parts[3].trim())
      };

      const { error } = await supabase
        .from("transactions")
        .insert([row]);

      if (error) {
        if (error.code === "23505") {
          duplicates++;
        } else {
          alert("שגיאה: " + error.message);
          return;
        }
      } else {
        inserted++;
      }
    }

    alert("הסתיים.\nנוספו: " + inserted + "\nכפילויות: " + duplicates);
  };

  reader.readAsText(file);
}
</script>

</body>
</html>
