<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>טעינת CSV פשוטה</title>
</head>
<body>

<h2>טעינת קובץ CSV</h2>

<input type="file" id="fileInput">
<button onclick="processFile()">טעינה</button>

<script>
function processFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("לא נבחר קובץ");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const text = e.target.result;

    const lines = text.split("\n");

    if (lines.length < 2) {
      alert("הקובץ ריק או לא תקין");
      return;
    }

    alert("נמצאו " + (lines.length - 1) + " שורות נתונים");

    // מדפיס שורה ראשונה לבדיקה
    alert("שורה ראשונה:\n" + lines[1]);
  };

  reader.readAsText(file);
}
</script>

</body>
</html>
