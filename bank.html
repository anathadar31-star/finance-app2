<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bank</title>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Assistant',sans-serif;
background:linear-gradient(135deg,#f5f7fb,#eef2f7);
padding:20px;
margin:0;
}

h1{
text-align:center;
color:#333;
}

.menu{
text-align:center;
margin-bottom:20px;
}

button{
background:#4a90e2;
color:white;
border:none;
padding:10px 15px;
margin:5px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#357ABD;
}

input{
margin:10px auto;
display:block;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#eef3f8;
}

.debit{
color:#d9534f;
}

.credit{
color:#28a745;
}

</style>
</head>

<body>

<h1>תנועות בנק</h1>

<div class="menu">

<button onclick="location.href='dashboard.html'">Dashboard</button>

<button onclick="location.href='credit.html'">אשראי</button>

</div>

<input type="file" id="fileInput">

<table>

<thead>

<tr>
<th>date</th>
<th>description</th>
<th>debit</th>
<th>credit</th>
<th>category</th>
<th>note</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

document.getElementById("fileInput").addEventListener("change",loadFile)

function loadFile(e){

let file=e.target.files[0]

if(!file){
alert("בחרי קובץ")
return
}

let reader=new FileReader()

reader.onload=function(event){

let rows=event.target.result.split("\n")

let body=document.getElementById("tableBody")

body.innerHTML=""

rows.slice(1).forEach(r=>{

let cols=r.split(",")

if(cols.length<2)return

let tr=document.createElement("tr")

cols.forEach((c,i)=>{

let td=document.createElement("td")

td.textContent=c

if(i==2) td.className="debit"
if(i==3) td.className="credit"

tr.appendChild(td)

})

body.appendChild(tr)

})

}

reader.readAsText(file)

}

</script>

</body>
</html>
