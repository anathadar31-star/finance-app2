<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>טעינת תנועות בנק</title>

<style>

body{
font-family:Arial;
direction:rtl;
padding:20px;
background:#f5f5f5;
}

h1{
margin-bottom:20px;
}

.nav{
margin-bottom:20px;
}

button{
padding:10px 18px;
margin-left:10px;
border-radius:6px;
border:1px solid #444;
background:white;
cursor:pointer;
font-size:16px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:right;
}

th{
background:#f0f0f0;
}

.total{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

</head>

<body>

<div class="nav">
<button onclick="location.href='index.html'">דף ראשי</button>
<button onclick="location.href='dashboard.html'">דשבורד</button>
</div>

<h1>טעינת תנועות בנק</h1>

<input type="file" id="fileInput" accept=".xlsx">

<button onclick="loadFile()">טען קובץ</button>

<table>

<thead>
<tr>
<th>תאריך</th>
<th>תיאור</th>
<th>סכום</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="total" id="total"></div>

<script>

function loadFile(){

const input = document.getElementById("fileInput");

const file = input.files[0];

if(!file){
alert("בחרי קובץ קודם");
return;
}

const reader = new FileReader();

reader.onload = function(event){

const data = new Uint8Array(event.target.result);

const workbook = XLSX.read(data,{type:"array"});

const sheet = workbook.Sheets[workbook.SheetNames[0]];

const rows = XLSX.utils.sheet_to_json(sheet,{defval:""});

console.log(rows);

fillTable(rows);

};

reader.readAsArrayBuffer(file);

}

function parseNumber(value){

if(!value) return 0;

value = value.toString()
.replace(",", "")
.replace("₪","")
.trim();

return parseFloat(value) || 0;

}

function fillTable(rows){

const tbody = document.getElementById("tableBody");

tbody.innerHTML="";

let total = 0;

rows.forEach(r=>{

const date = r["תאריך"];

const desc =
r["פרטים"] ||
r["הפעולה"] ||
r["עבור"] ||
"";

const debit =
parseNumber(r["חובה"]) ||
parseNumber(r["Debit"]) ||
parseNumber(r["סכום חובה"]);

if(debit>0){

const tr = document.createElement("tr");

tr.innerHTML = `
<td>${date}</td>
<td>${desc}</td>
<td>${debit.toFixed(2)} ₪</td>
`;

tbody.appendChild(tr);

total += debit;

}

});

document.getElementById("total").innerText =
"סה״כ הוצאות: " + total.toFixed(2) + " ₪";

}

</script>

</body>

</html>
