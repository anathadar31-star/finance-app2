<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finance Dashboard</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h1{
text-align:center;
}

button{
padding:10px 15px;
margin:10px;
font-size:16px;
}

.summary{
display:flex;
gap:20px;
margin:20px 0;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
flex:1;
text-align:center;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:right;
}

th{
background:#eeeeee;
}
</style>

</head>

<body>

<h1>Finance Dashboard</h1>

<input type="file" id="fileInput">

<div class="summary">

<div class="card">
סה"כ הכנסות<br>
<span id="income">0</span>
</div>

<div class="card">
סה"כ הוצאות<br>
<span id="expense">0</span>
</div>

<div class="card">
יתרה<br>
<span id="balance">0</span>
</div>

</div>

<table id="table">

<thead>
<tr>
<th>date</th>
<th>description</th>
<th>debit</th>
<th>credit</th>
<th>category</th>
<th>note</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

const input = document.getElementById("fileInput");

input.addEventListener("change", function(e){

const file = e.target.files[0];
const reader = new FileReader();

reader.onload = function(event){

const text = event.target.result;
const rows = text.split("\n");

const tbody = document.querySelector("#table tbody");

tbody.innerHTML="";

let totalIncome = 0;
let totalExpense = 0;

for(let i=1;i<rows.length;i++){

const cols = rows[i].split(",");

if(cols.length<5) continue;

const date = cols[0];
const desc = cols[1];
const debit = parseFloat(cols[2]) || 0;
const credit = parseFloat(cols[3]) || 0;
const category = cols[4] || "";
const note = cols[5] || "";

totalIncome += credit;
totalExpense += debit;

const tr = document.createElement("tr");

tr.innerHTML = `
<td>${date}</td>
<td>${desc}</td>
<td>${debit}</td>
<td>${credit}</td>
<td>${category}</td>
<td>${note}</td>
`;

tbody.appendChild(tr);

}

document.getElementById("income").innerText = totalIncome.toFixed(2);
document.getElementById("expense").innerText = totalExpense.toFixed(2);
document.getElementById("balance").innerText = (totalIncome-totalExpense).toFixed(2);

}

reader.readAsText(file);

});

</script>

</body>
</html>
