<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Assistant',sans-serif;
background:linear-gradient(135deg,#f7f9fc,#eef3f8);
padding:30px;
margin:0;
}

h1{
text-align:center;
margin-bottom:30px;
color:#333;
}

.menu{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

button{
background:#4a90e2;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#357abd;
}

input[type=file]{
display:block;
margin:20px auto;
}

.summary{
display:flex;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
flex:1;
min-width:180px;
text-align:center;
font-size:18px;
}

.card span{
display:block;
font-size:24px;
font-weight:600;
margin-top:5px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

th{
background:#f1f4f8;
padding:12px;
text-align:right;
font-weight:600;
}

td{
padding:10px;
border-top:1px solid #eee;
text-align:right;
}

tr:hover{
background:#fafafa;
}

</style>

</head>

<body>

<h1>ניהול כספים אישי</h1>

<div class="menu">

<button onclick="location.href='index.html'">דף ראשי</button>
<button onclick="location.href='upload.html'">טעינת קובץ</button>
<button onclick="saveData()">שמור נתונים</button>
<button onclick="clearData()">נקה נתונים</button>

</div>

<input type="file" id="fileInput">

<div class="summary">

<div class="card">
סה"כ הכנסות
<span id="income">0</span>
</div>

<div class="card">
סה"כ הוצאות
<span id="expense">0</span>
</div>

<div class="card">
יתרה
<span id="balance">0</span>
</div>

</div>

<table id="table">

<thead>
<tr>
<th>תאריך</th>
<th>תיאור</th>
<th>חובה</th>
<th>זכות</th>
<th>קטגוריה</th>
<th>הערה</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

let currentData=[];

const input=document.getElementById("fileInput");

input.addEventListener("change",function(e){

const file=e.target.files[0];
const reader=new FileReader();

reader.onload=function(event){

const text=event.target.result;
parseCSV(text);

}

reader.readAsText(file);

});

function parseCSV(text){

const rows=text.split("\n");

const tbody=document.querySelector("#table tbody");

tbody.innerHTML="";

let totalIncome=0;
let totalExpense=0;

currentData=[];

for(let i=1;i<rows.length;i++){

const cols=rows[i].split(",");

if(cols.length<5) continue;

const date=cols[0];
const desc=cols[1];
const debit=parseFloat(cols[2])||0;
const credit=parseFloat(cols[3])||0;
const category=cols[4]||"";
const note=cols[5]||"";

totalIncome+=credit;
totalExpense+=debit;

currentData.push(cols);

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${date}</td>
<td>${desc}</td>
<td>${debit}</td>
<td>${credit}</td>
<td>${category}</td>
<td>${note}</td>
`;

tbody.appendChild(tr);

}

document.getElementById("income").innerText=totalIncome.toFixed(2);
document.getElementById("expense").innerText=totalExpense.toFixed(2);
document.getElementById("balance").innerText=(totalIncome-totalExpense).toFixed(2);

}

function saveData(){

localStorage.setItem("financeData",JSON.stringify(currentData));

alert("הנתונים נשמרו");

}

function loadData(){

const saved=localStorage.getItem("financeData");

if(!saved) return;

const rows=JSON.parse(saved);

const tbody=document.querySelector("#table tbody");

tbody.innerHTML="";

let totalIncome=0;
let totalExpense=0;

rows.forEach(cols=>{

const debit=parseFloat(cols[2])||0;
const credit=parseFloat(cols[3])||0;

totalIncome+=credit;
totalExpense+=debit;

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${cols[0]}</td>
<td>${cols[1]}</td>
<td>${cols[2]}</td>
<td>${cols[3]}</td>
<td>${cols[4]}</td>
<td>${cols[5]}</td>
`;

tbody.appendChild(tr);

});

document.getElementById("income").innerText=totalIncome.toFixed(2);
document.getElementById("expense").innerText=totalExpense.toFixed(2);
document.getElementById("balance").innerText=(totalIncome-totalExpense).toFixed(2);

}

function clearData(){

localStorage.removeItem("financeData");

document.querySelector("#table tbody").innerHTML="";

document.getElementById("income").innerText=0;
document.getElementById("expense").innerText=0;
document.getElementById("balance").innerText=0;

alert("הנתונים נמחקו");

}

loadData();

</script>

</body>
</html>
