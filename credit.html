<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>כרטיסי אשראי</title>

<style>

body{
font-family:Arial;
direction:rtl;
text-align:center;
padding:60px;
background:#f7f7f7;
}

h1{
margin-bottom:40px;
}

table{
margin:auto;
border-collapse:collapse;
width:60%;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#4a90e2;
color:white;
}

button{
margin-top:30px;
padding:12px 25px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>כרטיסי אשראי</h1>

<table id="creditTable">
<tr>
<th>קטגוריה</th>
<th>סכום</th>
</tr>
</table>

<button onclick="location.href='index.html'">
חזרה לתפריט
</button>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/1AUDrZ8_dxTfvfxMLaviEAM0cAUcIpmIWJZigI3nC6EQ/export?format=csv&gid=0";

fetch(csvUrl)
.then(response => response.text())
.then(data => {

let rows = data.split("\n");
rows.shift();

let expensesByCategory = {};

rows.forEach(row => {

let cols = row.split(",");

let amount = parseFloat(cols[9]);
let category = cols[4];

if(!category || isNaN(amount)) return;

if(!expensesByCategory[category]){
expensesByCategory[category] = 0;
}

expensesByCategory[category] += amount;

});

let table = document.getElementById("creditTable");

for(let category in expensesByCategory){

let row = table.insertRow();

let cell1 = row.insertCell(0);
let cell2 = row.insertCell(1);

cell1.innerText = category;
cell2.innerText = expensesByCategory[category].toFixed(2) + " ₪";

}

});

</script>

</body>
</html>
