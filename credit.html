<!DOCTYPE html>
<html lang="he">

<head>
<meta charset="UTF-8">
<title>כרטיסי אשראי</title>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Assistant',sans-serif;
background:linear-gradient(135deg,#eef2f7,#f7f9fc);
padding:30px;
margin:0;
text-align:center;
}

h1{
color:#333;
margin-bottom:30px;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
max-width:600px;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
}

th{
background:#4a90e2;
color:white;
}

tr:hover{
background:#f5f7fb;
}

button{
margin-top:30px;
background:#4a90e2;
border:none;
padding:12px 25px;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#357ABD;
}

</style>

</head>

<body>

<h1>כרטיסי אשראי</h1>

<table id="creditTable">

<tr>
<th>קטגוריה</th>
<th>סכום</th>
</tr>

</table>

<button onclick="location.href='index.html'">
חזרה לתפריט
</button>

<script>

let expensesByCategory = {
"מזון":320,
"טלפוני":57,
"רגילה":221,
"עסקה חכמה":207
}

let table = document.getElementById("creditTable");

for(let category in expensesByCategory){

let row = table.insertRow();

let cell1 = row.insertCell(0);
let cell2 = row.insertCell(1);

cell1.innerText = category;
cell2.innerText = expensesByCategory[category] + " ₪";

}

</script>

</body>
</html>
