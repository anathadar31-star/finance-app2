<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>כרטיסי אשראי</title>

<style>

body{
font-family:Arial;
direction:rtl;
text-align:center;
background:#f4f6f9;
padding:40px;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
background:white;
}

th{
background:#4a90e2;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

button{
margin-top:20px;
padding:12px 20px;
font-size:16px;
}

</style>

</head>

<body>

<h1>כרטיסי אשראי</h1>

<input type="file" id="csvFile" accept=".csv">

<br><br>

<table id="table">
<thead>
<tr>
<th>קטגוריה</th>
<th>סכום</th>
</tr>
</thead>
<tbody></tbody>
</table>

<br>

<button onclick="location.href='index.html'">
חזרה לתפריט
</button>

<script>

document
.getElementById("csvFile")
.addEventListener("change", function(event){

const file = event.target.files[0];
const reader = new FileReader();

reader.onload = function(e){

const text = e.target.result;
const rows = text.split("\n");

const tableBody = document.querySelector("#table tbody");
tableBody.innerHTML="";

rows.forEach(row=>{

const cols = row.split(",");

if(cols.length>1){

const tr = document.createElement("tr");

tr.innerHTML=
"<td>"+cols[0]+"</td>"+
"<td>"+cols[1]+"</td>";

tableBody.appendChild(tr);

}

});

};

reader.readAsText(file);

});

</script>

</body>
</html>
